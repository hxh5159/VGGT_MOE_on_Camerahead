# =============================================================================
# VGGT Ablation Experiment Configs
# =============================================================================
# These configs are used to determine which loss function can be removed
# during fine-tuning on Co3D.
#
# Experiment variants:
#   A. Full loss (baseline):         camera(5.0) + depth(1.0)
#   B. Camera loss only:              camera(5.0), depth removed
#   C. Depth loss only:               depth(1.0), camera removed
#   D. Depth without gradient loss:   camera(5.0) + depth w/o gradient loss
#   E. Depth without conf loss:       camera(5.0) + depth w/o confidence loss
# =============================================================================

defaults:
  - default_dataset.yaml

exp_name: ablation_E_no_conf
img_size: 518
num_workers: 4
seed_value: 42
accum_steps: 4          # 梯度累积（chunk_batch会自动适配小batch避免空chunk）
patch_size: 14
val_epoch_freq: 5
max_img_per_gpu: 24

limit_train_batches: 400
limit_val_batches: 200

data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      repeat_batch: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: train
          min_num_images: 2    # 降低限制，适配小数据集
          CO3D_DIR: /YOUR/PATH/TO/CO3D
          CO3D_ANNOTATION_DIR: /YOUR/PATH/TO/CO3D_ANNOTATION
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: test
          min_num_images: 2    # 降低限制，适配小数据集
          CO3D_DIR: /YOUR/PATH/TO/CO3D
          CO3D_ANNOTATION_DIR: /YOUR/PATH/TO/CO3D_ANNOTATION


logging:
  log_dir: logs
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
    val:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth


checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 5
  resume_checkpoint_path: null
  strict: False


# =========================================================
# LOSS CONFIGURATION - MODIFY THIS FOR EACH ABLATION
# =========================================================
#
# Experiment A (Full baseline):
# loss:
#   _target_: loss.MultitaskLoss
#   camera:
#     weight: 5.0
#     loss_type: "l1"
#   depth:
#     weight: 1.0
#     gradient_loss_fn: "grad"
#     valid_range: 0.98
#   point: null
#   track: null

# Experiment B (Camera only):
# loss:
#   _target_: loss.MultitaskLoss
#   camera:
#     weight: 5.0
#     loss_type: "l1"
#   depth: null          # <-- Depth loss REMOVED
#   point: null
#   track: null

# Experiment C (Depth only):
# loss:
#   _target_: loss.MultitaskLoss
#   camera: null          # <-- Camera loss REMOVED
#   depth:
#     weight: 1.0
#     gradient_loss_fn: "grad"
#     valid_range: 0.98
#   point: null
#   track: null

# Experiment D (Depth without gradient loss):
# loss:
#   _target_: loss.MultitaskLoss
#   camera:
#     weight: 5.0
#     loss_type: "l1"
#   depth:
#     weight: 1.0
#     gradient_loss_fn: "none"   # <-- No gradient loss (use "none" to avoid NoneType crash)
#     valid_range: 0.98
#   point: null
#   track: null

# Experiment E (Depth without confidence loss):
loss:
  _target_: loss.MultitaskLoss
  camera:
    weight: 5.0
    loss_type: "l1"
  depth:
    weight: 1.0
    gradient_loss_fn: "grad"
    valid_range: 0.98
    skip_conf: True         # <-- 关闭置信度加权损失
  point: null
  track: null


optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 5e-5
    weight_decay: 0.05

  # NOTE: For ablation, we freeze aggregator to make experiments smaller
  frozen_module_names:
      - "*aggregator*"

  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["depth"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 1.0
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 5e-5
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 5e-5
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05


max_epochs: 10   # Shorter for ablation

model:
  _target_: vggt.models.vggt.VGGT
  enable_camera: True      # 实验E：需要相机loss
  enable_depth: True
  enable_point: False
  enable_track: False


distributed:
  backend: nccl
  comms_dtype: None
  find_unused_parameters: False
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
    cudnn_deterministic: False
    cudnn_benchmark: False
    allow_tf32: True
